openapi: 3.0.3
info:
  title: TransactionManagement
  version: 1.0.0
servers:
- url: http://localhost:4423
security:
- SessionCookie: []
paths:
  /v1/file-settings:
    get:
      operationId: FileSettingGetList
      summary: 'Gets a list of all File Settings'
      security:
        - SessionCookie: []
      tags:
        - File
      responses:
        '200':
          description: OK (200)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileSettingReadList'
        '401':
          description: Unauthorized (401)
        '500':
          description: Internal Server Error (500)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultResponse'
    
  /v1/file-settings/{SettingId}:
    put:
      operationId: FileSettingUpdate
      summary: 'Update an existing File Settings'
      tags:
        - File
      parameters:
        - name: SettingId
          in: path
          required: true
          schema:
            type: integer
        - name: LastChangedUser
          in: header
          description: Name of user performing the action
          required: true
          schema:
            type: string
            example: 'John Doe'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileSettingWrite'
      responses:
        '200':
          description: OK (200)
