            application/json:
              schema:
                $ref: '#/components/schemas/DefaultResponse'
  /v1/files/validation-errors/columns:
    get:
      tags:
        - File
      operationId: FileValidationErrorColumnGetList
      summary: Get stadium column definitions for a specific table
      description: Returns UI column definitions for the requested table and schema.
      parameters:
        - name: FileLogId
          in: query
          description: Target table name
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: OK (200)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnList'
              examples:
                sample:
                  value:
                    ColumnList:
                      - Name: 'Name'
                        HeaderText: 'User Name'
                        Visible: true
                        CellAlignment: 'left'
                        CellDisplay: 'text'
                        Classes: 'col-name'
                      - Name: 'Age'
                        HeaderText: 'Age'
                        Visible: true
                        CellAlignment: 'right'
                        CellDisplay: 'number'
                        Classes: 'col-age'
        '401':
          description: Unauthorized (401)
        '500':
          description: Internal Server Error (500)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultResponse'
  /v1/files/validation-errors:
    get:
      tags:
        - File
      operationId: FileValidationErrorGetList
      summary: Get invalid rows for a specific file as a single JSON array
      description: >
        Returns a ValidationErrors object containing JsonArray (a JSON array string of all per-row objects that have errors).
      parameters:
        - name: FileLogId
          in: query
          description: LogId of the file being inspected
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: OK (200)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrors'
              examples:
                sample:
                  value:
                    ValidationErrors:
                      JsonArray: >-
                        [{"Id":23,"PrimaryKeyValue":100,"ChangeType":"UPDATE","ChangedBy":"System","ChangedAt":"2025-09-29T15:28:56.2470934","Age":"19","Diet":"Herbivore","HabitatId":"5","LastChangedDate":"2025-09-29 13:20:11.9185595","LastChangedUser":"System","Name":"Bison","Species":"Bison bison"}]
        '401':
          description: Unauthorized (401)
        '500':
          description: Internal Server Error (500)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultResponse'

