      description: Upload a file.
      tags:
        - File
      parameters:
        - name: FileSettingId
          in: query
          description: The FileSettingId associated with the file
          required: true
          schema:
            type: integer
        - name: FileSettingName
          in: query
          description: The FileSettingName associated with the file
          required: true
          schema:
            type: string
        - name: FileName
          in: query
          description: The name of the file being uploaded
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
