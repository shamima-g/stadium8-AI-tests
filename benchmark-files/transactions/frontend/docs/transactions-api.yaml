      operationId: FilesDelete
      summary: Cancel a file by LogId
      description: Deactivate and delete a file from the staging table using its LogId
      parameters:
        - name: LogId
          in: query
          description: The LogId of the file to be deleted
          required: true
          schema:
            type: integer
        - name: LastChangedUser
          in: header
          description: Name of user performing the action
          required: true
          schema:
            type: string
            example: 'John Doe'
      responses:
