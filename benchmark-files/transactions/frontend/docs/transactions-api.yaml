  /v1/file-logs/data:
    get:
      operationId: FileLogDataDownload
      summary: Download a data file with input ID
      tags:
        - File
      description: Downloads a file from the server as a stream, using the provided file path.
      parameters:
        - name: LogId
          in: query
          required: true
          schema:
            type: string
          description: Id of the file in the log
      responses:
        '200':
          description: OK (200)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized (401)
        '500':
          description: Internal Server Error (500)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DefaultResponse'
  /v1/files/download:
    get:
      operationId: FilesDownload
      summary: Download a file with input ID
      tags:
        - File
      description: Downloads a file from the server as a stream, using the provided file path.
      parameters:
        - name: FileLogId
          in: query
          required: true
          schema:
            type: string
          description: Absolute or relative path to the file on the server
      responses:
        '200':
          description: OK (200)
          content:
            application/octet-stream:
